# HTTP → HTTPS redirect
server {
    listen 80;
    server_name aegiscloud.hackura.app;
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
# Note: certbot --nginx will populate the ssl_certificate lines automatically
server {
    listen 443 ssl;
    server_name aegiscloud.hackura.app;

    # SSL certs — populated by certbot (run deploy/setup-ssl.sh)
    # ssl_certificate /etc/letsencrypt/live/aegiscloud.hackura.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/aegiscloud.hackura.app/privkey.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Backend API — proxied to Node.js on port 8080
    location /api/ {
        proxy_pass http://localhost:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SSO path — proxied to same Node.js backend
    location /sso/ {
        proxy_pass http://localhost:8080/sso/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React SPA — static files
    location / {
        root /var/www/aegiscloud;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
