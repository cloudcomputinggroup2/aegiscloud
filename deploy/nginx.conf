server {
    listen 80;
    server_name _; # Accepts any domain or IP — no hardcoding needed

    # ── Backend API ────────────────────────────────────────────────────────────
    # All /api/* requests are proxied to the Node.js backend on port 8080
    location /api/ {
        proxy_pass http://localhost:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── SSO / Auth path ────────────────────────────────────────────────────────
    # /sso/* routes — handled by the same backend (no separate sso.domain.com needed)
    location /sso/ {
        proxy_pass http://localhost:8080/sso/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── React SPA (Frontend) ──────────────────────────────────────────────────
    # Serve the compiled Vite/React static files
    # All unknown paths fall back to index.html for client-side routing
    location / {
        root /var/www/aegiscloud;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
